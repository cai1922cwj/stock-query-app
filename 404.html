<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>股票查询APP</title>
  <script>
    // SPA 路由重定向
    const segment = 1;
    const l = window.location;
    const repo = '/stock-query-app';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      repo + '/?p=/' + l.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <h1>页面加载中...</h1>
</body>
</html>
