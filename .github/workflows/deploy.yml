# GitHub Pages 部署工作流
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Debug - Show all files
        run: |
          set -x
          pwd
          ls -la
          echo "---"
          cat package.json
          
      - name: Install dependencies
        run: |
          set -x
          npm install
          echo "Install exit code: $?"
          
      - name: Build
        run: |
          set -x
          npm run build
          echo "Build exit code: $?"
          
      - name: Check dist
        run: |
          set -x
          ls -la dist/
          cat dist/index.html | head -50
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
